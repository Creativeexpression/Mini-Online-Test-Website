<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Yourself</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        overflow:hidden;
        background:#0f172a; /* Solid dark futuristic background */
        position:relative;
    }

/* Canvas for particles */
    #bgCanvas{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:0;
    }

/* Glassmorphism navbar */
    .navbar{
        position:absolute;
        top:20px;
        right:40px;
        display:flex;
        gap:20px;
        padding:10px 20px;
        backdrop-filter:blur(14px);
        background:rgba(255,255,255,0.05);
        border-radius:12px;
        border:1px solid rgba(255,255,255,0.1);
        z-index:10;
    }

    .navbar a{
        text-decoration:none;
        color:white;
        font-weight:bold;
        padding:10px 22px;
        border-radius:8px;
        transition:.4s;
        position:relative;
        overflow:hidden;
    }

    .navbar a::before{
        content:"";
        position:absolute;
        top:0;
        left:-100%;
        width:100%;
        height:100%;
        background:linear-gradient(90deg,transparent,#ff6ec4,#7873f5,#00ffff,transparent);
        transition:.5s;
    }

    .navbar a:hover::before{
        left:100%;
    }

    .navbar a:hover{
        background:rgba(255,255,255,0.08);
        box-shadow:0 0 20px rgba(255,100,200,.5);
    }

/* Center content */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:5;
}

/* Neon glowing title */
.title{
  font-size:75px;
  font-weight:bold;
  letter-spacing:3px;
  background:linear-gradient(90deg,#ff6ec4,#7873f5,#00ffff);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:glow 4s infinite alternate;
}

@keyframes glow{
  0%{text-shadow:0 0 15px rgba(255,100,200,.4);}
  100%{text-shadow:0 0 40px rgba(120,115,245,.9),0 0 80px rgba(0,255,255,.7);}
}

/* Subtitle */
.subtitle{
  margin-top:20px;
  font-size:22px;
  color:#cbd5f5;
  letter-spacing:1px;
  text-shadow:0 0 10px rgba(255,255,255,0.3);
  z-index:5;
}

/* Floating neon bubbles */
.bubbles{
  position:fixed;
  width:100%;
  height:100%;
  overflow:hidden;
  pointer-events:none;
  z-index:2;
}

.bubbles span{
  position:absolute;
  bottom:-120px;
  background:rgba(255,255,255,0.15);
  border-radius:50%;
  animation:rise 18s linear infinite;
  box-shadow:0 0 15px rgba(255,255,255,0.5), inset 0 0 10px rgba(255,255,255,0.2);
}

.bubbles span:nth-child(1){left:10%; width:40px; height:40px; animation-duration:12s;}
.bubbles span:nth-child(2){left:25%; width:25px; height:25px; animation-duration:16s;}
.bubbles span:nth-child(3){left:40%; width:50px; height:50px; animation-duration:10s;}
.bubbles span:nth-child(4){left:55%; width:30px; height:30px; animation-duration:18s;}
.bubbles span:nth-child(5){left:70%; width:20px; height:20px; animation-duration:20s;}
.bubbles span:nth-child(6){left:85%; width:45px; height:45px; animation-duration:14s;}
.bubbles span:nth-child(7){left:50%; width:35px; height:35px; animation-duration:15s;}

@keyframes rise{
  0%{transform:translateY(0) scale(1); opacity:.7;}
  100%{transform:translateY(-130vh) scale(1.3); opacity:0;}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
</div>

<div class="navbar">
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
</div>

<div class="center">
  <div class="title">Test Yourself</div>
  <div class="subtitle">Challenge your knowledge and improve your skills</div>
</div>

<script>
// Particles only (no concentric circles)
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

class Particle{
  constructor(){
    this.x = Math.random()*w;
    this.y = Math.random()*h;
    this.radius = Math.random()*1.5+0.5;
    this.dx = (Math.random()-0.5)*0.3;
    this.dy = (Math.random()-0.5)*0.3;
    this.color = `hsla(${Math.random()*360}, 80%, 60%, 0.8)`;
  }
  update(){
    this.x += this.dx;
    this.y += this.dy;
    if(this.x<0)this.x=w;
    if(this.x>w)this.x=0;
    if(this.y<0)this.y=h;
    if(this.y>h)this.y=0;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

let particles = [];
for(let i=0;i<250;i++){
  particles.push(new Particle());
}

function animate(){
  ctx.clearRect(0,0,w,h); // Clear canvas for smooth animation
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize',()=>{
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});
</script>

</body>
</html>
