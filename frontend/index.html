<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Yourself</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="bubbles">
  <span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
</div>

<div class="navbar">
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
</div>

<div class="center">
  <div class="title">Test Yourself</div>
  <div class="subtitle">Challenge your knowledge and improve your skills</div>
</div>

<script>
// Particles only (no concentric circles)
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

class Particle{
  constructor(){
    this.x = Math.random()*w;
    this.y = Math.random()*h;
    this.radius = Math.random()*1.5+0.5;
    this.dx = (Math.random()-0.5)*0.3;
    this.dy = (Math.random()-0.5)*0.3;
    this.color = `hsla(${Math.random()*360}, 80%, 60%, 0.8)`;
  }
  update(){
    this.x += this.dx;
    this.y += this.dy;
    if(this.x<0)this.x=w;
    if(this.x>w)this.x=0;
    if(this.y<0)this.y=h;
    if(this.y>h)this.y=0;
  }
  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

let particles = [];
for(let i=0;i<250;i++){
  particles.push(new Particle());
}

function animate(){
  ctx.clearRect(0,0,w,h); // Clear canvas for smooth animation
  particles.forEach(p=>{
    p.update();
    p.draw();
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize',()=>{
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});
</script>

</body>
</html>
